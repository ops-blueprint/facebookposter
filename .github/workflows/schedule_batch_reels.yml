name: Batch-schedule reels (Facebook native scheduler)

# Runs daily with a small rolling window (3 days) rather than one big monthly
# batch -- reels are much slower to generate (ffmpeg encoding per fact) than
# image posts, so smaller/frequent runs are safer than one long ~30min job.
# Each run only fills in slots not already scheduled (tracked in
# scheduled_slots_reels.json), so daily reruns never duplicate a slot.
# This job's own trigger timing doesn't need to be precise -- Facebook's
# servers handle the actual publish-time precision via scheduled_publish_time.
on:
  schedule:
    - cron: "0 4 * * *"   # once daily, offset from the image-post batch job
  workflow_dispatch:
    inputs:
      days:
        description: "How many days ahead to top up (max 29)"
        required: false
        default: "3"

jobs:
  schedule:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          pip install -r content_pipeline/requirements.txt
          pip install -r fb_auto_poster/requirements.txt

      - name: Generate and schedule the next few days of reels
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
        run: >
          python3 schedule_batch_reels.py --days "${{ github.event.inputs.days || '3' }}"
          --times "01:00,05:00,09:00,13:00,17:00,21:00" --handle "@NatureWonders9"

      - name: Commit updated dedupe + slot logs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content_pipeline/used_facts.json content_pipeline/scheduled_slots_reels.json
          git diff --cached --quiet && exit 0
          git commit -m "Update dedupe/slot logs (reel batch schedule) [skip ci]"
          for i in 1 2 3 4 5; do
            if git push; then
              exit 0
            fi
            echo "Push rejected (attempt $i) -- retrying..."
            sleep $((RANDOM % 10 + 5))
            git pull --rebase origin main
          done
          echo "Failed to push after 5 attempts."
          exit 1
