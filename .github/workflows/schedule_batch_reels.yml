name: Batch-schedule reels (Facebook native scheduler)

# Same rationale as schedule_batch.yml: this job's own trigger timing doesn't
# need to be precise since it just needs to run sometime before the current
# ~29-day buffer of scheduled reels runs out. Facebook's servers handle the
# actual publish-time precision via scheduled_publish_time.
on:
  schedule:
    - cron: "0 4 1,21 * *"   # 1st and 21st of each month, offset from the image-post batch job
  workflow_dispatch:
    inputs:
      days:
        description: "How many days to schedule (max 29)"
        required: false
        default: "29"

jobs:
  schedule:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          pip install -r content_pipeline/requirements.txt
          pip install -r fb_auto_poster/requirements.txt

      - name: Generate and schedule a batch of reels
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
        run: python3 schedule_batch_reels.py --days "${{ github.event.inputs.days || '29' }}" --handle "@NatureWonders9"

      - name: Commit updated dedupe log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content_pipeline/used_facts.json
          git diff --cached --quiet && exit 0
          git commit -m "Update used_facts log (reel batch schedule) [skip ci]"
          for i in 1 2 3 4 5; do
            if git push; then
              exit 0
            fi
            echo "Push rejected (attempt $i) -- retrying..."
            sleep $((RANDOM % 10 + 5))
            git pull --rebase origin main
          done
          echo "Failed to push after 5 attempts."
          exit 1
