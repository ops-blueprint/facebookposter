name: Batch-schedule posts (Facebook native scheduler)

# Runs roughly every 3 weeks -- generates + uploads ~29 days of posts using
# Facebook's own scheduled_publish_time, so Facebook's servers do the actual
# publishing at the exact time. This job's own trigger timing doesn't need to
# be precise (GitHub's cron delay doesn't matter here) since it just needs to
# run sometime before the current buffer of scheduled posts runs out.
on:
  schedule:
    - cron: "0 3 1,21 * *"   # 1st and 21st of each month -- comfortable overlap margin
  workflow_dispatch:
    inputs:
      days:
        description: "How many days to schedule (max 29)"
        required: false
        default: "29"

jobs:
  schedule:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r content_pipeline/requirements.txt
          pip install -r fb_auto_poster/requirements.txt

      - name: Generate and schedule a batch of posts
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
        run: python3 schedule_batch.py --days "${{ github.event.inputs.days || '29' }}" --handle "@NatureWonders9"

      - name: Commit updated dedupe + slot logs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content_pipeline/used_facts.json content_pipeline/scheduled_slots_images.json
          git diff --cached --quiet && exit 0
          git commit -m "Update dedupe/slot logs (batch schedule) [skip ci]"
          for i in 1 2 3 4 5; do
            if git push; then
              exit 0
            fi
            echo "Push rejected (attempt $i) -- retrying..."
            sleep $((RANDOM % 10 + 5))
            git pull --rebase origin main
          done
          echo "Failed to push after 5 attempts."
          exit 1
